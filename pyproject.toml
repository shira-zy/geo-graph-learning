[project]
name = "geo-graph-learning"
version = "0.1.0"
description = "Student package for the Geospatial Graph Learning chapter of a Geo AI course"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "jupyter",
    "ipykernel",
]

# Per-unit optional dependencies. Add libraries to a unit's extra as that
# unit is built. Keep this hand-edited — `requirements/*.txt` is auto-generated.
[project.optional-dependencies]
unit-1 = [
    "osmnx>=2.0,<3.0",
    "networkx>=3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "requests",
    "pyrosm",
    "igraph",
    "folium",
    "mapclassify",
    "gdown",
]
unit-2 = [
    "leuvenmapmatching",
    "osmnx>=2.0,<3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj",
    "rtree",
    "scipy",
    "networkx>=3.0",
    "filterpy",
    "tslearn",
    "scikit-image",
    "folium",
    "mapclassify",
    "branca",
    "contextily",
    "pyarrow",
    "gdown",
]
unit-3 = [
    "pandas>=2.0",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "statsmodels>=0.14",
    "statsforecast>=1.7",
    "pyarrow>=14",
    "h5py>=3.0",
    "folium>=0.15",
    "gdown>=5.0",
    "shapely>=2.0",
    "pyproj",
]
unit-4 = [
    "osmnx>=2.0",
    "networkx>=3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj",
    "rtree",
    "scipy",
    "gtfs-kit",
    "folium",
    "mapclassify",
    "branca",
    "contextily",
    "pyarrow",
    "gdown",
]
unit-5 = [
    "scikit-learn",
    "matplotlib",
    "folium",
    "gdown>=5.0",
    "numpy>=1.24",
]
all = [
    # Union of all built units, so `uv sync --extra all` installs everything.
    # Self-referential extras: each entry pulls in a per-unit extra defined
    # above. Add `geo-graph-learning[unit-5]` here when unit-5 gains deps.
    # NB: hand-edited and public-only — the per-unit publish pipeline
    # (sync_unit_extra.py) rewrites only `[unit-N]` blocks, never this one.
    "geo-graph-learning[unit-1]",
    "geo-graph-learning[unit-2]",
    "geo-graph-learning[unit-3]",
    "geo-graph-learning[unit-4]",
]
dev = [
    "papermill",
    "nbqa",
    "pre-commit",
]
# Local-only tools for the agent-driven notebook bridge (see SETUP.md and
# .mcp.json). NOT a unit extra → never enters requirements/*.txt or Colab.
# jupyter-mcp-server itself runs via `uvx` (isolated), so it is not pinned here.
# jupyter-collaboration 4.x (the RTC extension that lets the agent and student
# co-edit without save conflicts) requires JupyterLab >=4.4, so both track the
# current 4.x line together.
local = [
    "jupyterlab>=4.4,<5.0",
    "jupyter-collaboration>=4.0,<5.0",
    "ipykernel",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.uv]
# Reproducible installs across the cohort.
package = true
